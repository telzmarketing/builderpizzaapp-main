name: Deploy — Produção

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite acionar manualmente pelo GitHub UI

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/moschettieri

            echo "━━━ [1/5] Puxando código ━━━"
            git pull origin main

            echo "━━━ [2/5] Dependências Python ━━━"
            source .venv/bin/activate
            pip install -r backend/requirements.txt --quiet

            echo "=== [3/6] Migracoes Alembic ==="
            alembic -c backend/alembic.ini current
            alembic -c backend/alembic.ini heads
            alembic -c backend/alembic.ini upgrade 20260701_whatsapp_audio_phase5_agent_response

            echo "━━━ [3/5] Build do frontend ━━━"
            pnpm install --frozen-lockfile --silent
            pnpm build

            echo "━━━ [4/5] Reiniciando serviços ━━━"
            sudo systemctl restart moschettieri-api
            sudo systemctl restart moschettieri-web
            if systemctl list-unit-files | grep -q '^moschettieri-whatsapp-gateway.service'; then
              sudo systemctl restart moschettieri-whatsapp-gateway
            fi

            echo "━━━ [5/5] Health check ━━━"
            sleep 4
            curl -sf http://localhost:8000/health \
              && echo "✅ Backend OK" \
              || (echo "❌ Backend falhou" && sudo journalctl -u moschettieri-api -n 20 --no-pager && exit 1)

            if systemctl list-unit-files | grep -q '^moschettieri-whatsapp-gateway.service'; then
              pnpm whatsapp-gateway:health \
                && echo "WhatsApp Gateway OK" \
                || (echo "WhatsApp Gateway falhou" && sudo journalctl -u moschettieri-whatsapp-gateway -n 20 --no-pager && exit 1)
            fi

            echo "🚀 Deploy concluído com sucesso!"
