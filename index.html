<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Motoboy" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Pizza Delivery App</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
      (function () {
        var path = window.location.pathname;
        var shouldPreloadCatalog = path === "/" || path === "/cardapio" || path.indexOf("/product/") === 0;
        if (!shouldPreloadCatalog) return;
        window.__MOSCHETTIERI_PRODUCTS_PRELOAD__ = fetch("/api/products?active_only=true", {
          headers: { Accept: "application/json" }
        })
          .then(function (response) {
            if (!response.ok) return null;
            var contentType = response.headers.get("content-type") || "";
            if (contentType.indexOf("application/json") === -1) return null;
            return response.json();
          })
          .catch(function () {
            return null;
          });
      })();
    </script>
    <script type="module" src="/client/main.tsx"></script>
  </body>
</html>
